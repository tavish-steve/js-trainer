<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <p>Numeric Operations</p>
    </div>
    <script>
      let x = 19;
      let y = 8;

      let sum = x + y
      let sub = x - y
      let multi = x * y
      let div = x / y;
      let expo = x ** y
      let mod = x % y

      console.log(sum)
      console.log(sub)
      console.log(multi)
      console.log(div)
      console.log(expo)
      console.log(mod)

      let num = 50
      num++
      num++
      num++
      num++
      num--
      num--

      console.log (num)
    </script>
  </body>
</html>
